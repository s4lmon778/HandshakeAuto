name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: "HandshakeAuto_*.AppImage"
            name-suffix: "linux"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: "HandshakeAuto_*.dmg"
            name-suffix: "macos"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: "HandshakeAuto_*.exe"
            name-suffix: "windows"

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_PAGES_BASE: ""

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handshake-auto-${{ matrix.name-suffix }}
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Structure artifacts for release
        run: |
          mkdir -p release-assets
          find . -type f \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: release-assets/*
          generate_release_notes: true
          make_latest: true

      - name: Upload workflow dispatch artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: all-platforms
          path: release-assets/*
